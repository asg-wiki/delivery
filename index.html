<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배달 플랫폼 업무 백과사전</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>배달 플랫폼 업무 백과사전</h1>
  </header>

  <div id="admin-bar"></div>

  <nav class="tabs" id="tabs"></nav>

  <input type="text" id="search" class="search-box" placeholder="검색어를 입력하세요 (예: 리뷰 노출)" autocomplete="off">

  <div class="popular-tags" id="popular-tags"></div>

  <div class="chip-row" id="chips"></div>

  <div class="result-count" id="result-count"></div>
  <div id="results"></div>
</div>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
